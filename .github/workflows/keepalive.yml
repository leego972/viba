name: Keep Alive
  on:
    schedule:
      - cron: '*/9 * * * *'
    workflow_dispatch:
  jobs:
    ping:
      runs-on: ubuntu-latest
      steps:
        - name: Ping viba
          run: |
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://www.viba.guru/api/healthz || echo "000")
            echo "Health check status: $STATUS"
  