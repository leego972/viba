name: VIBA CI

on:
  push:
    branches:
      - main
      - 'checkpoint/**'
      - 'fix/**'
      - 'feat/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: viba-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: viba
          POSTGRES_PASSWORD: viba
          POSTGRES_DB: viba_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U viba -d viba_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 5050
      DATABASE_URL: postgres://viba:viba@localhost:5432/viba_test
      SESSION_SECRET: ci-session-secret-change-before-production
      CREDENTIAL_ENCRYPTION_KEY: ci-credential-encryption-key-change-before-production
      PUBLIC_ORIGIN: http://localhost:5050
      CORS_ALLOWED_ORIGINS: http://localhost:5050
      TEST_BYPASS_SESSION: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm --filter @workspace/db run push

      - name: Typecheck
        run: pnpm run typecheck

      - name: API tests
        run: pnpm --filter @workspace/api-server run test

      - name: Build all packages
        run: pnpm run build

      - name: Safe build gate
        run: pnpm run safe-build
