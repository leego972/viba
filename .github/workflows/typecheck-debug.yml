name: Typecheck Debug

on:
  pull_request:
    branches: [main]

jobs:
  typecheck-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies quietly
        run: pnpm install --frozen-lockfile=false --silent
      - name: Typecheck and keep log
        shell: bash
        run: |
          set +e
          pnpm run typecheck > typecheck.log 2>&1
          echo $? > typecheck-status.txt
          exit 0
      - name: Upload typecheck log
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: |
            typecheck.log
            typecheck-status.txt
          if-no-files-found: error
