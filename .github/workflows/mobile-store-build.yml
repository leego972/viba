name: Build VIBA Store Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: App version (for example 1.0.0)
        required: true
        default: 1.0.0
      android_version_code:
        description: Android version code
        required: true
        default: "1"

jobs:
  android:
    name: Android Play Store AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/bridge-ai
    env:
      VIBA_MOBILE_URL: https://viba.guru
      VIBA_APP_VERSION: ${{ inputs.version }}
      VIBA_ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
      VIBA_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/artifacts/bridge-ai/android/app/viba-upload.jks
      VIBA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.VIBA_ANDROID_KEYSTORE_PASSWORD }}
      VIBA_ANDROID_KEY_ALIAS: ${{ secrets.VIBA_ANDROID_KEY_ALIAS }}
      VIBA_ANDROID_KEY_PASSWORD: ${{ secrets.VIBA_ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Restore Android upload keystore
        run: echo "${{ secrets.VIBA_ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/viba-upload.jks
      - name: Build and sync wrapper
        run: pnpm run mobile:prepare
      - name: Build signed Android App Bundle
        run: ./gradlew bundleRelease
        working-directory: artifacts/bridge-ai/android
      - uses: actions/upload-artifact@v4
        with:
          name: viba-android-play-store
          path: artifacts/bridge-ai/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios:
    name: iOS App Store IPA
    runs-on: macos-15
    defaults:
      run:
        working-directory: artifacts/bridge-ai
    env:
      VIBA_MOBILE_URL: https://viba.guru
      VIBA_APP_VERSION: ${{ inputs.version }}
      APPLE_TEAM_ID: ${{ secrets.VIBA_APPLE_TEAM_ID }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.VIBA_IOS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Generate iOS native project
        run: |
          pnpm run build
          rm -rf ios
          pnpm exec cap add ios
          pnpm exec cap sync ios
      - name: Install signing certificate and provisioning profile
        run: |
          CERT_PATH="$RUNNER_TEMP/viba-distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/viba.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/viba-signing.keychain-db"
          echo "${{ secrets.VIBA_IOS_CERTIFICATE_BASE64 }}" | base64 --decode > "$CERT_PATH"
          echo "${{ secrets.VIBA_IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PROFILE_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/viba.mobileprovision"
      - name: Configure version and signing
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VIBA_APP_VERSION" ios/App/App/Info.plist
          xcodebuild -project ios/App/App.xcodeproj -target App -configuration Release \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" PRODUCT_BUNDLE_IDENTIFIER="guru.viba.app" \
            MARKETING_VERSION="$VIBA_APP_VERSION" CURRENT_PROJECT_VERSION="${{ inputs.android_version_code }}" \
            CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="${{ secrets.VIBA_IOS_PROFILE_NAME }}" \
            clean archive -archivePath "$RUNNER_TEMP/VIBA.xcarchive"
      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict><key>guru.viba.app</key><string>${{ secrets.VIBA_IOS_PROFILE_NAME }}</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/VIBA.xcarchive" \
            -exportPath "$RUNNER_TEMP/VIBA-export" -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
      - uses: actions/upload-artifact@v4
        with:
          name: viba-ios-app-store
          path: ${{ runner.temp }}/VIBA-export/*.ipa
          if-no-files-found: error
