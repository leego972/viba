name: Build VIBA Store Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: App version (for example 1.0.0)
        required: true
        default: 1.0.0
      build_number:
        description: Store build number
        required: true
        default: "1"

jobs:
  android:
    name: Android Play Store AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/bridge-ai
    env:
      VIBA_MOBILE_URL: https://viba.guru
      VIBA_APP_VERSION: ${{ inputs.version }}
      VIBA_ANDROID_VERSION_CODE: ${{ inputs.build_number }}
      VIBA_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/artifacts/bridge-ai/android/app/viba-upload.jks
      VIBA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.VIBA_ANDROID_KEYSTORE_PASSWORD }}
      VIBA_ANDROID_KEY_ALIAS: ${{ secrets.VIBA_ANDROID_KEY_ALIAS }}
      VIBA_ANDROID_KEY_PASSWORD: ${{ secrets.VIBA_ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Restore or create Android upload key
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE="android/app/viba-upload.jks"
          BACKUP_DIR="$RUNNER_TEMP/viba-android-signing"
          mkdir -p "$BACKUP_DIR"

          if [ -n "${{ secrets.VIBA_ANDROID_KEYSTORE_BASE64 }}" ]; then
            printf '%s' "${{ secrets.VIBA_ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE"
            echo "Using the saved Android upload key."
          else
            STORE_PASS="$(openssl rand -hex 24)"
            KEY_PASS="$(openssl rand -hex 24)"
            KEY_ALIAS="viba-upload"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE" \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 4096 -validity 10000 \
              -dname "CN=VIBA, OU=Mobile, O=VIBA, L=Melbourne, ST=Victoria, C=AU"

            echo "VIBA_ANDROID_KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
            echo "VIBA_ANDROID_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"
            echo "VIBA_ANDROID_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"

            cp "$KEYSTORE" "$BACKUP_DIR/viba-upload.jks"
            cat > "$BACKUP_DIR/KEEP-PRIVATE.txt" <<EOF
          VIBA_ANDROID_KEYSTORE_PASSWORD=$STORE_PASS
          VIBA_ANDROID_KEY_PASSWORD=$KEY_PASS
          VIBA_ANDROID_KEY_ALIAS=$KEY_ALIAS
          EOF
            echo "A new Android upload key was generated. Download and preserve the signing-backup artifact."
          fi
      - name: Build and sync wrapper
        run: pnpm run mobile:prepare
      - name: Build signed Android App Bundle
        run: ./gradlew bundleRelease
        working-directory: artifacts/bridge-ai/android
      - uses: actions/upload-artifact@v4
        with:
          name: viba-android-play-store
          path: artifacts/bridge-ai/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: ${{ secrets.VIBA_ANDROID_KEYSTORE_BASE64 == '' }}
        with:
          name: viba-android-signing-backup-keep-private
          path: ${{ runner.temp }}/viba-android-signing
          if-no-files-found: error
          retention-days: 90

  ios:
    name: iOS App Store IPA
    runs-on: macos-15
    defaults:
      run:
        working-directory: artifacts/bridge-ai
    env:
      VIBA_MOBILE_URL: https://viba.guru
      VIBA_APP_VERSION: ${{ inputs.version }}
      APPLE_TEAM_ID: ${{ secrets.VIBA_APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.VIBA_APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.VIBA_APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Create App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "${{ secrets.VIBA_APP_STORE_CONNECT_PRIVATE_KEY }}" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
      - name: Generate iOS native project
        run: |
          pnpm run build
          rm -rf ios
          pnpm exec cap add ios
          pnpm exec cap sync ios
      - name: Archive with Apple automatic signing
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="guru.viba.app" \
            MARKETING_VERSION="$VIBA_APP_VERSION" \
            CURRENT_PROJECT_VERSION="${{ inputs.build_number }}" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            clean archive -archivePath "$RUNNER_TEMP/VIBA.xcarchive"
      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/VIBA.xcarchive" \
            -exportPath "$RUNNER_TEMP/VIBA-export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
      - uses: actions/upload-artifact@v4
        with:
          name: viba-ios-app-store
          path: ${{ runner.temp }}/VIBA-export/*.ipa
          if-no-files-found: error
