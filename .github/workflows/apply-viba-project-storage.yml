name: Apply VIBA Project Storage Integration

on:
  push:
    branches: [audit/viba-production-hardening-20260723]
    paths:
      - .github/viba-project-storage-bundle/**

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/viba-production-hardening-20260723
          fetch-depth: 0

      - name: Install reviewed integration bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/viba-project-storage-bundle/part-* | base64 --decode > /tmp/viba-project-storage-bundle.tgz
          tar -tzf /tmp/viba-project-storage-bundle.tgz | grep -Ev '(^/|(^|/)\.\.(/|$))' >/tmp/viba-bundle-paths.txt
          test "$(wc -l </tmp/viba-bundle-paths.txt)" -eq 15
          tar -xzf /tmp/viba-project-storage-bundle.tgz -C .
          rm -rf .github/viba-project-storage-bundle
          git rm .github/workflows/apply-viba-project-storage.yml
          git config user.name "VIBA Production Audit"
          git config user.email "audit@viba.guru"
          git add -A
          git commit -m "product: persist user builds and complete project admin UI"
          git push origin HEAD:audit/viba-production-hardening-20260723
