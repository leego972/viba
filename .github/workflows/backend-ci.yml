name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false --reporter=silent

      - name: Build workspace type declarations
        run: pnpm run typecheck:libs

      - name: Typecheck Bridge AI frontend
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/bridge-ai run typecheck > frontend-typecheck.log 2>&1
          status=$?
          cat frontend-typecheck.log
          exit $status

      - name: Upload frontend typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-typecheck-diagnostics
          path: frontend-typecheck.log
          retention-days: 3

      - name: Run Bridge AI unit tests
        run: pnpm --filter @workspace/bridge-ai run unit-test

      - name: Build Bridge AI frontend
        run: pnpm --filter @workspace/bridge-ai run build

      - name: Typecheck backend and workspace
        shell: bash
        run: |
          set +e
          pnpm run typecheck > workspace-typecheck.log 2>&1
          status=$?
          cat workspace-typecheck.log
          exit $status

      - name: Upload workspace typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-typecheck-diagnostics
          path: workspace-typecheck.log
          retention-days: 3

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
