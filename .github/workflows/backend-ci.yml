name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package audit source
        run: git archive --format=zip --output=viba-source.zip HEAD

      - name: Upload audit source
        uses: actions/upload-artifact@v4
        with:
          name: viba-audit-source
          path: viba-source.zip
          retention-days: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck backend and workspace
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          retention-days: 7

      - name: Fail on typecheck errors
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

      - name: Run API tests
        id: api_tests
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/api-server run test 2>&1 | tee api-tests.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload API test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-log
          path: api-tests.log
          retention-days: 7

      - name: Fail on API test errors
        if: steps.api_tests.outputs.exit_code != '0'
        run: exit 1

      - name: Run Bridge unit tests
        id: bridge_tests
        shell: bash
        run: |
          set +e
          pnpm --filter @workspace/bridge-ai run unit-test 2>&1 | tee bridge-tests.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Bridge test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-test-log
          path: bridge-tests.log
          retention-days: 7

      - name: Fail on Bridge test errors
        if: steps.bridge_tests.outputs.exit_code != '0'
        run: exit 1

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build Bridge AI frontend
        run: pnpm --filter @workspace/bridge-ai run build
