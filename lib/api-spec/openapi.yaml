openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BridgeAI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Bridge session management
  - name: settings
    description: Application settings
  - name: stats
    description: Aggregated usage statistics
  - name: workbench
    description: AI Trainer Workbench — human-reviewed task analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new bridge session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Session deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/run-next:
    post:
      operationId: runNextStep
      tags: [sessions]
      summary: Run next agent step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStepResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/run-full:
    post:
      operationId: runFullWorkflow
      tags: [sessions]
      summary: Run full supervised workflow (up to 8 turns)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStepResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/message:
    post:
      operationId: sendMessage
      tags: [sessions]
      summary: User sends instruction to session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/approve:
    post:
      operationId: approveAction
      tags: [sessions]
      summary: Approve a pending action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveActionBody"
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/stop:
    post:
      operationId: stopSession
      tags: [sessions]
      summary: Stop an active session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/agents:
    get:
      operationId: listAgents
      tags: [sessions]
      summary: List agents in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /sessions/{id}/tasks:
    get:
      operationId: listTasks
      tags: [sessions]
      summary: List tasks in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /sessions/{id}/messages:
    get:
      operationId: listMessages
      tags: [sessions]
      summary: List messages in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /sessions/{id}/memory:
    get:
      operationId: getMemory
      tags: [sessions]
      summary: Get shared memory for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [sessions]
      summary: List audit logs for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /sessions/{id}/approvals:
    get:
      operationId: listApprovals
      tags: [sessions]
      summary: List approvals for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approval"

  /sessions/{id}/banner-dismissal:
    get:
      operationId: getBannerDismissal
      tags: [sessions]
      summary: Get banner dismissal timestamp for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Banner dismissal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannerDismissal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: dismissBanner
      tags: [sessions]
      summary: Record that the user dismissed the banner for this session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissBannerBody"
      responses:
        "200":
          description: Banner dismissal recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannerDismissal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
    post:
      operationId: saveSettings
      tags: [settings]
      summary: Save settings (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/test-notification:
    post:
      operationId: sendTestNotification
      tags: [stats]
      summary: Send a test spike notification
      description: Posts a test payload to the configured webhook URL and sends a real test email (when SMTP is configured) so the user can verify each notification channel works.
      responses:
        "200":
          description: Test notification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResult"
        "400":
          description: No webhook URL configured or URL invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get aggregated usage statistics
      description: Returns session counts and fallback event counts grouped by provider
      responses:
        "200":
          description: Aggregated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeStats"

  /circuit-status:
    get:
      operationId: getCircuitStatus
      tags: [stats]
      summary: Get per-provider circuit breaker status
      description: Returns the current open/half-open/closed state for every provider tracked by the circuit breaker
      responses:
        "200":
          description: Circuit breaker status per provider
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CircuitBreakerEntry"

  /circuit-status/{provider}:
    delete:
      operationId: deleteCircuitStatus
      tags: [stats]
      summary: Manually reset a provider's circuit breaker
      description: Immediately clears an open or half-open circuit for a provider, allowing live calls to resume. The reset is persisted to the database so it survives restarts and is visible to all running instances.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: The provider name to reset (e.g. "openai", "anthropic")
      responses:
        "200":
          description: Circuit successfully reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetCircuitResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /circuit-status/{provider}/reset:
    post:
      operationId: resetCircuit
      tags: [stats]
      summary: Manually reset a provider's circuit breaker (legacy)
      description: Immediately clears an open or half-open circuit for a provider, allowing live calls to resume. The reset is persisted to the database so it survives restarts and is visible to all running instances.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: The provider name to reset (e.g. "openai", "anthropic")
      responses:
        "200":
          description: Circuit successfully reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetCircuitResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workbench/health:
    get:
      operationId: getWorkbenchHealth
      tags: [workbench]
      summary: Workbench health check
      description: Returns the health status of the AI Trainer Workbench module
      responses:
        "200":
          description: Module is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchHealthResponse"

  /workbench/analyze:
    post:
      operationId: analyzeWorkbenchTask
      tags: [workbench]
      summary: Analyse a training task
      description: >
        Accepts a platform task (instructions + content + optional rubric) and
        returns a recommended answer with rubric checklist, risk flags, confidence
        score, and review level. Every response must be reviewed by a human before
        manual submission. Automatic login, submission, or platform automation is
        not supported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchAnalyzeRequest"
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchAnalyzeResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Request refused by safety policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workbench/refuse-check:
    post:
      operationId: workbenchRefuseCheck
      tags: [workbench]
      summary: Pre-flight safety check
      description: >
        Tests whether a given request text would be refused by the workbench
        safety policy without running a full analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchRefuseCheckRequest"
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchRefuseCheckResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BannerDismissal:
      type: object
      properties:
        sessionId:
          type: integer
        dismissedAt:
          type: ["string", "null"]
      required:
        - sessionId
        - dismissedAt

    DismissBannerBody:
      type: object
      properties:
        dismissedAt:
          type: string
          description: >
            Optional ISO 8601 timestamp to use as the dismissal time.
            When omitted the server uses the current time. Pass the
            original localStorage timestamp during migration so the
            banner re-show logic (based on timestamp comparison) is
            preserved correctly.

    ProviderFallbackCount:
      type: object
      properties:
        provider:
          type: string
        count:
          type: integer
      required:
        - provider
        - count

    FallbackTrendPoint:
      type: object
      properties:
        day:
          type: string
        count:
          type: integer
      required:
        - day
        - count

    ModelUsageCount:
      type: object
      properties:
        model:
          type: string
        count:
          type: integer
        liveCount:
          type: integer
          description: Number of messages generated by the live API
        simulatedCount:
          type: integer
          description: Number of messages generated by the simulation fallback
      required:
        - model
        - count
        - liveCount
        - simulatedCount

    ModelUsageBreakdown:
      type: object
      properties:
        model:
          type: string
        provider:
          type: string
        mode:
          type: string
          enum: [live, simulated]
        count:
          type: integer
      required:
        - model
        - provider
        - mode
        - count

    BridgeStats:
      type: object
      properties:
        totalSessions:
          type: integer
        activeSessions:
          type: integer
        completedSessions:
          type: integer
        fallbackEvents:
          type: integer
        fallbacksByProvider:
          type: array
          items:
            $ref: "#/components/schemas/ProviderFallbackCount"
        fallbackTrend:
          type: array
          items:
            $ref: "#/components/schemas/FallbackTrendPoint"
        modelUsage:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsageCount"
        modelUsageBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsageBreakdown"
          description: Per-model message counts split by live vs. simulated, grouped by provider
        spikeProviders:
          type: array
          items:
            type: string
        recentSpikeProviders:
          type: array
          items:
            type: string
          description: Providers that exceeded the alert threshold in the rolling window
        recentSpikeThreshold:
          type: integer
          description: Configured fallback alert threshold
        alertEnabled:
          type: boolean
          description: Whether fallback spike alerts are enabled
      required:
        - totalSessions
        - activeSessions
        - completedSessions
        - fallbackEvents
        - fallbacksByProvider
        - fallbackTrend
        - modelUsage
        - modelUsageBreakdown
        - spikeProviders
        - recentSpikeProviders
        - recentSpikeThreshold
        - alertEnabled

    TestNotificationResult:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        emailSent:
          type: boolean
          description: Whether a test email was actually delivered. False when SMTP is not configured or delivery failed.
      required:
        - ok
        - message

    ResetCircuitResult:
      type: object
      properties:
        ok:
          type: boolean
        provider:
          type: string
      required:
        - ok
        - provider

    CircuitBreakerEntry:
      type: object
      properties:
        provider:
          type: string
        state:
          type: string
          enum: [open, half-open, closed]
        consecutiveFailures:
          type: integer
        openedAt:
          type: ["integer", "null"]
          description: Unix ms timestamp when the circuit opened, or null if closed
        msUntilReset:
          type: ["integer", "null"]
          description: Milliseconds remaining until the circuit allows a probe, or null if closed
        persistedAt:
          type: ["integer", "null"]
          description: Unix ms timestamp of the last time this state was written to the database, or null if not yet persisted
        openThreshold:
          type: integer
          description: Number of consecutive failures required to open the circuit (CIRCUIT_OPEN_THRESHOLD)
        timeoutMs:
          type: integer
          description: Cooldown window in milliseconds before a half-open probe is allowed (CIRCUIT_TIMEOUT_MS)
      required:
        - provider
        - state
        - consecutiveFailures
        - openedAt
        - msUntilReset
        - persistedAt
        - openThreshold
        - timeoutMs

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AgentModeSummary:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        isMock:
          type: boolean
      required:
        - name
        - provider
        - isMock

    Session:
      type: object
      properties:
        id:
          type: integer
        goal:
          type: string
        status:
          type: string
        autonomyMode:
          type: string
        mode:
          type: string
          enum: ["live", "simulation", "mixed"]
        estimatedCost:
          type: ["number", "null"]
        finalOutput:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        agentModes:
          type: array
          items:
            $ref: "#/components/schemas/AgentModeSummary"
      required:
        - id
        - goal
        - status
        - autonomyMode
        - mode
        - estimatedCost
        - finalOutput
        - createdAt
        - updatedAt
        - agentModes

    SessionDetail:
      type: object
      properties:
        id:
          type: integer
        goal:
          type: string
        status:
          type: string
        autonomyMode:
          type: string
        mode:
          type: string
          enum: ["live", "simulation", "mixed"]
        estimatedCost:
          type: ["number", "null"]
        finalOutput:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        memory:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/Memory"
            - type: "null"
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
      required:
        - id
        - goal
        - status
        - autonomyMode
        - mode
        - estimatedCost
        - finalOutput
        - createdAt
        - updatedAt
        - agents
        - tasks
        - messages
        - memory
        - approvals

    CreateSessionBody:
      type: object
      properties:
        goal:
          type: string
        autonomyMode:
          type: string
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentInput"
      required:
        - goal
        - autonomyMode
        - agents

    AgentInput:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        role:
          type: string
        isMock:
          type: boolean
      required:
        - name
        - provider
        - role
        - isMock

    Agent:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        name:
          type: string
        provider:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        isMock:
          type: boolean
        lastUsedModel:
          type: ["string", "null"]
        activeModel:
          type: ["string", "null"]
          description: Model name derived at query time from the agent's most recent message
      required:
        - id
        - sessionId
        - name
        - provider
        - role
        - capabilities
        - isMock
        - lastUsedModel

    Task:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
        status:
          type: string
        assignedAgentId:
          type: ["integer", "null"]
        costEstimate:
          type: ["number", "null"]
        dependencyTaskId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - sessionId
        - title
        - description
        - type
        - status
        - assignedAgentId
        - costEstimate
        - dependencyTaskId
        - createdAt
        - updatedAt

    Message:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        agentId:
          type: ["integer", "null"]
        role:
          type: string
        provider:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        content:
          type: string
        taskId:
          type: ["integer", "null"]
        agentName:
          type: ["string", "null"]
        agentRole:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - agentId
        - role
        - provider
        - model
        - content
        - taskId
        - agentName
        - agentRole
        - createdAt

    Memory:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        summary:
          type: string
        decisions:
          type: array
          items:
            type: string
        updatedAt:
          type: string
      required:
        - id
        - sessionId
        - summary
        - decisions
        - updatedAt

    Approval:
      type: object
      properties:
        id:
          type: integer
