openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VIBA - Collaborative Multi-Agent Orchestration System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Bridge session management
  - name: settings
    description: Application settings
  - name: stats
    description: Aggregated usage statistics
  - name: workbench
    description: AI Trainer Workbench — human-reviewed task analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new bridge session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update session workspace context (repo, branch, environment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Session deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/run-next:
    post:
      operationId: runNextStep
      tags: [sessions]
      summary: Run next agent step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStepResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/run-full:
    post:
      operationId: runFullWorkflow
      tags: [sessions]
      summary: Run full supervised workflow (up to 8 turns)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStepResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/message:
    post:
      operationId: sendMessage
      tags: [sessions]
      summary: User sends instruction to session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/messages/{messageId}/answer:
    post:
      operationId: answerQuestion
      tags: [sessions]
      summary: User answers an agent's question directed at them
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerQuestionBody"
      responses:
        "201":
          description: Answer posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request or not a user-directed question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/approve:
    post:
      operationId: approveAction
      tags: [sessions]
      summary: Approve a pending action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveActionBody"
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/stop:
    post:
      operationId: stopSession
      tags: [sessions]
      summary: Stop an active session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/agents:
    get:
      operationId: listAgents
      tags: [sessions]
      summary: List agents in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /sessions/{id}/tasks:
    get:
      operationId: listTasks
      tags: [sessions]
      summary: List tasks in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /sessions/{id}/messages:
    get:
      operationId: listMessages
      tags: [sessions]
      summary: List messages in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: query
          required: false
          description: "Filter by message type: output | question | answer | handoff | context"
          schema:
            type: string
            enum: [output, question, answer, handoff, context]
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /sessions/{id}/memory:
    get:
      operationId: getMemory
      tags: [sessions]
      summary: Get shared memory for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [sessions]
      summary: List audit logs for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /sessions/{id}/approvals:
    get:
      operationId: listApprovals
      tags: [sessions]
      summary: List approvals for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approval"

  /sessions/{id}/banner-dismissal:
    get:
      operationId: getBannerDismissal
      tags: [sessions]
      summary: Get banner dismissal timestamp for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Banner dismissal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannerDismissal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: dismissBanner
      tags: [sessions]
      summary: Record that the user dismissed the banner for this session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissBannerBody"
      responses:
        "200":
          description: Banner dismissal recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannerDismissal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
    post:
      operationId: saveSettings
      tags: [settings]
      summary: Save settings (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveSettingsResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/test-notification:
    post:
      operationId: sendTestNotification
      tags: [stats]
      summary: Send a test spike notification
      description: Posts a test payload to the configured webhook URL and sends a real test email (when SMTP is configured) so the user can verify each notification channel works.
      responses:
        "200":
          description: Test notification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResult"
        "400":
          description: No webhook URL configured or URL invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get aggregated usage statistics
      description: Returns session counts and fallback event counts grouped by provider
      responses:
        "200":
          description: Aggregated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeStats"

  /circuit-status:
    get:
      operationId: getCircuitStatus
      tags: [stats]
      summary: Get per-provider circuit breaker status
      description: Returns the current open/half-open/closed state for every provider tracked by the circuit breaker, along with startup DB load metadata
      responses:
        "200":
          description: Circuit breaker status per provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircuitStatusResponse"

  /circuit-status/{provider}:
    delete:
      operationId: deleteCircuitStatus
      tags: [stats]
      summary: Manually reset a provider's circuit breaker
      description: Immediately clears an open or half-open circuit for a provider, allowing live calls to resume. The reset is persisted to the database so it survives restarts and is visible in the circuit status endpoint immediately.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Circuit reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetCircuitResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workbench/health:
    get:
      operationId: workbenchHealth
      tags: [workbench]
      summary: Workbench health check
      responses:
        "200":
          description: Workbench healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchHealthResponse"

  /workbench/analyze:
    post:
      operationId: workbenchAnalyze
      tags: [workbench]
      summary: Analyze a task with the AI workbench
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchAnalyzeRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchAnalyzeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workbench/refuse-check:
    post:
      operationId: workbenchRefuseCheck
      tags: [workbench]
      summary: Check whether a request should be refused
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchRefuseCheckRequest"
      responses:
        "200":
          description: Refuse check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbenchRefuseCheckResponse"

  /github/repo:
    get:
      operationId: getGithubRepo
      tags: [settings]
      summary: Fetch metadata for a single GitHub repository
      parameters:
        - name: owner
          in: query
          required: true
          schema:
            type: string
          description: Repository owner (user or org)
        - name: repo
          in: query
          required: true
          schema:
            type: string
          description: Repository name
      responses:
        "200":
          description: Repository metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubRepo"
        "400":
          description: Missing owner or repo param
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: GitHub integration not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /github/repos:
    get:
      operationId: listGithubRepos
      tags: [settings]
      summary: List GitHub repositories accessible via the connected integration
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GithubRepo"
        "503":
          description: GitHub integration not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AgentModeSummary:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        isMock:
          type: boolean
      required:
        - name
        - provider
        - isMock

    UpdateSessionBody:
      type: object
      properties:
        repoUrl:
          type: string
          nullable: true
          description: Git repository URL (null clears it)
        repoBranch:
          type: string
          nullable: true
          description: Branch name (null clears it)
        workspaceEnv:
          type: string
          nullable: true
          description: "Environment label: development | staging | production (null clears it)"

    GithubRepo:
      type: object
      properties:
        fullName:
          type: string
          description: "Owner/repo (e.g. acme/my-app)"
        htmlUrl:
          type: string
          description: Full HTTPS URL to the repository
        defaultBranch:
          type: string
          description: Default branch name
        private:
          type: boolean
          description: Whether the repository is private
      required:
        - fullName
        - htmlUrl
        - defaultBranch
        - private

    Session:
      type: object
      properties:
        id:
          type: integer
        goal:
          type: string
        status:
          type: string
        autonomyMode:
          type: string
        mode:
          type: string
          enum: [live, simulation, mixed]
        estimatedCost:
          type: number
          nullable: true
        finalOutput:
          type: string
          nullable: true
        repoUrl:
          type: string
          nullable: true
          description: Git repository URL connected to this session (optional)
        repoBranch:
          type: string
          nullable: true
          description: Target branch — defaults to main when not specified
        workspaceEnv:
          type: string
          nullable: true
          description: "Environment label: development | staging | production"
        createdAt:
          type: string
        updatedAt:
          type: string
        agentModes:
          type: array
          items:
            $ref: "#/components/schemas/AgentModeSummary"
      required:
        - id
        - goal
        - status
        - autonomyMode
        - mode
        - estimatedCost
        - finalOutput
        - createdAt
        - updatedAt
        - agentModes

    Agent:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        name:
          type: string
        provider:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        isMock:
          type: boolean
        canUseTools:
          type: boolean
          description: "True for Replit and Manus — agents that can execute tools, run code, clone repos, etc."
        lastUsedModel:
          type: string
          nullable: true
        activeModel:
          type: string
          nullable: true
          description: Model name derived at query time from the agent's most recent message
      required:
        - id
        - sessionId
        - name
        - provider
        - role
        - capabilities
        - isMock
        - canUseTools
        - lastUsedModel

    Task:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
        status:
          type: string
          description: "planned | in_progress | complete | review | blocked_needs_tools"
        assignedAgentId:
          type: integer
          nullable: true
        costEstimate:
          type: number
          nullable: true
        dependencyTaskId:
          type: integer
          nullable: true
        blockedReason:
          type: string
          nullable: true
          description: Why a text-only agent could not complete this task (tool limitation)
        partialWork:
          type: string
          nullable: true
          description: Work the text-only agent completed before hitting the tool blocker
        toolRequirements:
          type: array
          nullable: true
          items:
            type: string
          description: Tool names required to finish this task (e.g. git_clone, run_tests)
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - sessionId
        - title
        - description
        - type
        - status
        - assignedAgentId
        - costEstimate
        - dependencyTaskId
        - createdAt
        - updatedAt

    Message:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        agentId:
          type: integer
          nullable: true
        role:
          type: string
        provider:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        content:
          type: string
        taskId:
          type: integer
          nullable: true
        agentName:
          type: string
          nullable: true
        agentRole:
          type: string
          nullable: true
        messageType:
          type: string
          description: "Inter-agent message type: output | question | answer | handoff | context"
          enum: [output, question, answer, handoff, context]
        toAgentId:
          type: integer
          nullable: true
          description: For question/answer/handoff messages — the receiving agent's id
        toAgentName:
          type: string
          nullable: true
          description: Resolved display name of the receiving agent (derived at query time from toAgentId)
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Extra structured data (e.g. partialWork, remainingWork, questionRef)
        toolOutputs:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ToolOutput"
          description: Structured tool outputs (diffs, test results, deployment URLs, build logs, git ops)
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - agentId
        - role
        - provider
        - model
        - content
        - taskId
        - agentName
        - agentRole
        - messageType
        - createdAt

    Memory:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        summary:
          type: string
        decisions:
          type: array
          items:
            type: string
        updatedAt:
          type: string
      required:
        - id
        - sessionId
        - summary
        - decisions
        - updatedAt

    Approval:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        type:
          type: string
        description:
          type: string
        status:
          type: string
        createdAt:
          type: string
        approvedAt:
          type: string
          nullable: true
      required:
        - id
        - sessionId
        - type
        - description
        - status
        - createdAt
        - approvedAt

    SessionDetail:
      type: object
      properties:
        id:
          type: integer
        goal:
          type: string
        status:
          type: string
        autonomyMode:
          type: string
        mode:
          type: string
          enum: [live, simulation, mixed]
        estimatedCost:
          type: number
          nullable: true
        finalOutput:
          type: string
          nullable: true
        repoUrl:
          type: string
          nullable: true
          description: Git repository URL connected to this session (optional)
        repoBranch:
          type: string
          nullable: true
          description: Target branch — defaults to main when not specified
        workspaceEnv:
          type: string
          nullable: true
          description: "Environment label: development | staging | production"
        createdAt:
          type: string
        updatedAt:
          type: string
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        memory:
          oneOf:
            - $ref: "#/components/schemas/Memory"
            - type: "null"
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
      required:
        - id
        - goal
        - status
        - autonomyMode
        - mode
        - estimatedCost
        - finalOutput
        - createdAt
        - updatedAt
        - agents
        - tasks
        - messages
        - memory
        - approvals

    AgentInput:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        role:
          type: string
        isMock:
          type: boolean
        canUseTools:
          type: boolean
          description: >
            Override whether this agent can execute tools/code. Defaults to
            true for replit/manus providers and false for text-only providers.
            Users can explicitly enable tool capability for any provider.
      required:
        - name
        - provider
        - role
        - isMock

    CreateSessionBody:
      type: object
      properties:
        goal:
          type: string
        autonomyMode:
          type: string
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentInput"
        repoUrl:
          type: string
          description: Git repository URL for tool-capable agents to operate on (optional)
        repoBranch:
          type: string
          description: Branch to target — defaults to main if not specified
        workspaceEnv:
          type: string
          description: "Environment label: development | staging | production"
      required:
        - goal
        - autonomyMode
        - agents

    RunStepResult:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/Session"
        newMessages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        updatedTasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        approvalRequired:
          type: boolean
        approval:
          oneOf:
            - $ref: "#/components/schemas/Approval"
            - type: "null"
        stepsRun:
          type: integer
      required:
        - session
        - newMessages
        - updatedTasks
        - approvalRequired
        - approval
        - stepsRun

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        eventType:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - eventType
        - description
        - metadata
        - createdAt

    Setting:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        value:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - key
        - value
        - createdAt
        - updatedAt

    SettingResult:
      type: object
      properties:
        key:
          type: string
        status:
          type: string
          enum: [saved, skipped, deleted]
      required:
        - key
        - status

    SaveSettingsResponse:
      type: object
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/Setting"
        results:
          type: array
          items:
            $ref: "#/components/schemas/SettingResult"
      required:
        - settings
        - results

    SaveSettingsBody:
      type: object
      properties:
        settings:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
            required:
              - key
              - value
      required:
        - settings

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnswerQuestionBody:
      type: object
      properties:
        content:
          type: string
          description: The user's answer text
      required:
        - content

    ApproveActionBody:
      type: object
      properties:
        approvalId:
          type: integer
      required:
        - approvalId

    BannerDismissal:
      type: object
      properties:
        sessionId:
          type: integer
        dismissedAt:
          type: string
          nullable: true
      required:
        - sessionId
        - dismissedAt

    DismissBannerBody:
      type: object
      properties:
        dismissedAt:
          type: string
          description: |
            Optional ISO 8601 timestamp to use as the dismissal time. When omitted the server uses the current time. Pass the original localStorage timestamp during migration so the banner re-show logic (based on timestamp comparison) is preserved correctly.

    ProviderFallbackCount:
      type: object
      properties:
        provider:
          type: string
        count:
          type: integer
      required:
        - provider
        - count

    FallbackTrendPoint:
      type: object
      properties:
        day:
          type: string
        count:
          type: integer
      required:
        - day
        - count

    ModelUsageCount:
      type: object
      properties:
        model:
          type: string
        count:
          type: integer
        liveCount:
          type: integer
          description: Number of messages generated by the live API
        simulatedCount:
          type: integer
          description: Number of messages generated by the simulation fallback
      required:
        - model
        - count
        - liveCount
        - simulatedCount

    ModelUsageBreakdown:
      type: object
      properties:
        model:
          type: string
        provider:
          type: string
        mode:
          type: string
          enum: [live, simulated]
        count:
          type: integer
      required:
        - model
        - provider
        - mode
        - count

    BridgeStats:
      type: object
      properties:
        totalSessions:
          type: integer
        activeSessions:
          type: integer
        completedSessions:
          type: integer
        fallbackEvents:
          type: integer
        fallbacksByProvider:
          type: array
          items:
            $ref: "#/components/schemas/ProviderFallbackCount"
        fallbackTrend:
          type: array
          items:
            $ref: "#/components/schemas/FallbackTrendPoint"
        modelUsage:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsageCount"
        modelUsageBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsageBreakdown"
          description: Per-model message counts split by live vs. simulated, grouped by provider
        spikeProviders:
          type: array
          items:
            type: string
        recentSpikeProviders:
          type: array
          items:
            type: string
          description: Providers that exceeded the alert threshold in the rolling window
        recentSpikeThreshold:
          type: integer
          description: Configured fallback alert threshold
        alertEnabled:
          type: boolean
          description: Whether fallback spike alerts are enabled
        lastSpikeNotification:
          type: object
          nullable: true
          description: Details of the last out-of-band spike notification that was dispatched, or null if none has been sent since server start
          properties:
            sentAt:
              type: integer
              description: Unix ms timestamp when the notification was sent
            providers:
              type: array
              items:
                type: string
            channels:
              type: array
              items:
                type: string
            emailAddresses:
              type: array
              items:
                type: string
      required:
        - totalSessions
        - activeSessions
        - completedSessions
        - fallbackEvents
        - fallbacksByProvider
        - fallbackTrend
        - modelUsage
        - modelUsageBreakdown
        - spikeProviders
        - recentSpikeProviders
        - recentSpikeThreshold
        - alertEnabled

    TestNotificationResult:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        emailSent:
          type: boolean
          description: Whether a test email was actually delivered. False when SMTP is not configured or delivery failed.
      required:
        - ok
        - message

    ResetCircuitResult:
      type: object
      properties:
        ok:
          type: boolean
        provider:
          type: string
      required:
        - ok
        - provider

    CircuitBreakerEntry:
      type: object
      properties:
        provider:
          type: string
        state:
          type: string
          enum: [open, half-open, closed]
        consecutiveFailures:
          type: integer
        openedAt:
          type: integer
          nullable: true
          description: Unix ms timestamp when the circuit opened, or null if closed
        msUntilReset:
          type: integer
          nullable: true
          description: Milliseconds remaining until the circuit allows a probe, or null if closed
        persistedAt:
          type: integer
          nullable: true
          description: Unix ms timestamp of the last time this state was written to the database, or null if not yet persisted
        openThreshold:
          type: integer
          description: Number of consecutive failures required to open the circuit (CIRCUIT_OPEN_THRESHOLD)
        timeoutMs:
          type: integer
          description: Cooldown window in milliseconds before a half-open probe is allowed (CIRCUIT_TIMEOUT_MS)
      required:
        - provider
        - state
        - consecutiveFailures
        - openedAt
        - msUntilReset
        - persistedAt
        - openThreshold
        - timeoutMs

    CircuitStatusResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CircuitBreakerEntry"
        lastLoadedAt:
          type: integer
          nullable: true
          description: Unix ms timestamp when circuit state was last loaded from DB at startup, or null if loadCircuitStateFromDb has not run yet
        restoredCount:
          type: integer
          description: Number of circuit entries restored from DB during the last startup load (0 if DB was empty or load has not run)
      required:
        - entries
        - lastLoadedAt
        - restoredCount

    WorkbenchHealthResponse:
      type: object
      properties:
        status:
          type: string
        module:
          type: string
        version:
          type: string
      required:
        - status
        - module
        - version

    WorkbenchAnalyzeRequest:
      type: object
      properties:
        platform:
          type: string
          enum: [alignerr, outlier, dataannotation, toloka, remotasks, mindrift, other]
        taskType:
          type: string
          enum: [grammar_cleanup, classification, sentiment_labeling, response_comparison, factuality_check, math_reasoning, coding, expert_domain, subjective_judgment, unknown]
        instructions:
          type: string
        rubric:
          type: string
        taskContent:
          type: string
        answerOptions:
          type: array
          items:
            type: string
        userNotes:
          type: string
        budgetLimitUsd:
          type: number
        routingMode:
          type: string
          enum: [fast, balanced, quality]
      required:
        - platform
        - instructions
        - taskContent

    WorkbenchAnalyzeResponse:
      type: object
      properties:
        taskId:
          type: string
        platform:
          type: string
        taskType:
          type: string
        recommendedAnswer:
          type: string
        confidence:
          type: number
        reasoningSummary:
          type: string
        riskFlags:
          type: array
          items:
            type: string
        rubricChecklist:
          type: array
          items:
            type: string
        reviewLevel:
          type: string
          enum: [quick_review, careful_review, human_only]
        humanReviewRequired:
          type: boolean
        routingReceipt:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - taskId
        - platform
        - taskType
        - recommendedAnswer
        - confidence
        - reasoningSummary
        - riskFlags
        - rubricChecklist
        - reviewLevel
        - humanReviewRequired

    WorkbenchRefuseCheckRequest:
      type: object
      properties:
        requestText:
          type: string
      required:
        - requestText

    WorkbenchRefuseCheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string
          nullable: true
      required:
        - allowed
        - reason

    FileDiffOutput:
      type: object
      properties:
        type:
          type: string
          enum: [file_diff]
        filename:
          type: string
        diff:
          type: string
          description: Unified diff format
        additions:
          type: integer
          nullable: true
        deletions:
          type: integer
          nullable: true
      required:
        - type
        - filename
        - diff

    TestResultOutput:
      type: object
      properties:
        type:
          type: string
          enum: [test_result]
        passed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
          nullable: true
        duration:
          type: number
          nullable: true
          description: Duration in seconds
        log:
          type: string
          nullable: true
      required:
        - type
        - passed
        - failed

    DeploymentUrlOutput:
      type: object
      properties:
        type:
          type: string
          enum: [deployment_url]
        url:
          type: string
        environment:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
      required:
        - type
        - url

    CommandOutput:
      type: object
      properties:
        type:
          type: string
          enum: [command_output]
        command:
          type: string
        output:
          type: string
        exitCode:
          type: integer
          nullable: true
      required:
        - type
        - command
        - output

    BuildLogOutput:
      type: object
      properties:
        type:
          type: string
          enum: [build_log]
        log:
          type: string
        success:
          type: boolean
        duration:
          type: number
          nullable: true
          description: Duration in seconds
      required:
        - type
        - log
        - success

    GitOperationOutput:
      type: object
      properties:
        type:
          type: string
          enum: [git_operation]
        operation:
          type: string
          description: "e.g. commit, push, merge, clone"
        branch:
          type: string
        commitSha:
          type: string
          nullable: true
        commitMessage:
          type: string
          nullable: true
      required:
        - type
        - operation
        - branch

    ToolOutput:
      oneOf:
        - $ref: "#/components/schemas/FileDiffOutput"
        - $ref: "#/components/schemas/TestResultOutput"
        - $ref: "#/components/schemas/DeploymentUrlOutput"
        - $ref: "#/components/schemas/CommandOutput"
        - $ref: "#/components/schemas/BuildLogOutput"
        - $ref: "#/components/schemas/GitOperationOutput"
      discriminator:
        propertyName: type
        mapping:
          file_diff: "#/components/schemas/FileDiffOutput"
          test_result: "#/components/schemas/TestResultOutput"
          deployment_url: "#/components/schemas/DeploymentUrlOutput"
          command_output: "#/components/schemas/CommandOutput"
          build_log: "#/components/schemas/BuildLogOutput"
          git_operation: "#/components/schemas/GitOperationOutput"
