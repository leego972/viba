services:
  - type: web
    name: viba
    runtime: node
    plan: starter
    region: oregon
    buildCommand: bash render-build.sh
    startCommand: npm start
    healthCheckPath: /api/healthz
    autoDeployTrigger: checksPass
    disk:
      name: viba-project-storage
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: COREPACK_INTEGRITY_KEYS
        value: "0"
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.1
      - key: PNPM_VERSION
        value: 10.24.0
      - key: VIBA_PROJECT_STORAGE_ROOT
        value: /var/data/viba-projects
