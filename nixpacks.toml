[phases.setup]
    nixPkgs = ["nodejs_22", "pnpm"]

  [phases.install]
    cmds = ["pnpm install --no-frozen-lockfile"]

  [phases.build]
    cmds = ["NODE_ENV=production BASE_PATH=/ PORT=8080 pnpm --filter @workspace/bridge-ai run build && pnpm --filter @workspace/api-server run build"]

  [start]
    cmd = "pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs"
