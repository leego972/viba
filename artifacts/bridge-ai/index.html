<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIBA — Collaborative Multi-Agent Orchestration System</title>
    <link rel="icon" type="image/png" href="/viba-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..800;1,14..32,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style id="viba-cream-document-theme">
      :root {
        --viba-cream: #fff7e6;
        --viba-cream-soft: #fffaf0;
        --viba-cream-panel: #fff1cf;
        --viba-cream-border: #e8c986;
        --viba-ink: #111827;
        --viba-muted-ink: #5f5a50;
      }
      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        max-width: 100%;
        overflow-x: hidden;
        background: var(--viba-cream) !important;
        color: var(--viba-ink) !important;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(232, 201, 134, 0.28), transparent 34rem),
          linear-gradient(180deg, var(--viba-cream) 0%, var(--viba-cream-soft) 100%) !important;
      }
      main,
      section,
      header,
      footer,
      [class*="min-h-screen"],
      [class*="min-h-[100dvh]"],
      [class*="bg-background"],
      [class*="bg-[#0a0e1a]"],
      [class*="via-[#0a0e1a]"],
      [class*="from-blue-950"],
      [class*="to-indigo-950"],
      [class*="bg-gradient-to-br"] {
        background: var(--viba-cream) !important;
        color: var(--viba-ink) !important;
      }
      .bg-white,
      [class*="bg-white/5"],
      [class*="bg-white/10"],
      [class*="bg-white/[0.015]"],
      [class*="bg-white/[0.02]"],
      [class*="bg-white/[0.03]"],
      [class*="bg-white/[0.05]"],
      [class*="bg-white/[0.08]"],
      [class*="bg-card"],
      [class*="bg-muted"] {
        background: var(--viba-cream-soft) !important;
      }
      [class*="border-white/10"],
      [class*="border-white/[0.06]"],
      [class*="border-white/[0.07]"],
      [class*="border-white/[0.08]"],
      [class*="border-border"] {
        border-color: rgba(184, 134, 11, 0.28) !important;
      }
      .text-white,
      [class*="text-white"] {
        color: var(--viba-ink) !important;
      }
      button.text-white,
      button [class*="text-white"],
      [class*="bg-primary"].text-white,
      [class*="from-blue-600"],
      [class*="to-indigo-600"] {
        color: #fff !important;
      }
      .text-gray-300,
      .text-gray-400,
      .text-gray-500,
      .text-gray-600,
      [class*="text-gray-300"],
      [class*="text-gray-400"],
      [class*="text-gray-500"],
      [class*="text-gray-600"] {
        color: var(--viba-muted-ink) !important;
      }
      input,
      textarea,
      select {
        background-color: var(--viba-cream-soft) !important;
        color: var(--viba-ink) !important;
        border-color: rgba(184, 134, 11, 0.35) !important;
      }
      img[alt="VIBA"] {
        filter: drop-shadow(0 0 0.6px #000) drop-shadow(0.8px 0 #000) drop-shadow(-0.8px 0 #000) drop-shadow(0 0.8px #000) drop-shadow(0 -0.8px #000) !important;
      }
    </style>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        clearTimeout(window.__VIBA_TIMEOUT__);
        var el = document.getElementById('viba-error');
        if (!el) { el = document.createElement('div'); el.id = 'viba-error'; document.body.appendChild(el); }
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:1rem;font:14px monospace;z-index:9999;white-space:pre-wrap;';
        el.textContent = 'JS Error: ' + msg + '\n' + src + ':' + line + ':' + col + (err ? '\n' + err.stack : '');
      };
      window.addEventListener('unhandledrejection', function(e) {
        clearTimeout(window.__VIBA_TIMEOUT__);
        var el = document.getElementById('viba-error');
        if (!el) { el = document.createElement('div'); el.id = 'viba-error'; document.body.appendChild(el); }
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:1rem;font:14px monospace;z-index:9999;white-space:pre-wrap;';
        el.textContent = 'Unhandled rejection: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      });
      window.__VIBA_TIMEOUT__ = setTimeout(function() {
        var root = document.getElementById('root');
        if (root && !root.firstElementChild) {
          root.innerHTML = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#fff7e6;display:flex;align-items:center;justify-content:center;font-family:sans-serif;flex-direction:column;gap:16px;color:#111827"><div style="color:#4f46e5;font-size:32px;font-weight:700">VIBA</div><div style="color:#5f5a50;font-size:15px">Loading failed — please hard-refresh (Ctrl+Shift+R or Cmd+Shift+R)</div><div style="color:#7a6f60;font-size:13px">If this persists, try a different browser or disable extensions</div></div>';
        }
      }, 8000);
    </script>
  </head>
  <body>
    <div id="root">
      <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#fff7e6;display:flex;align-items:center;justify-content:center;font-family:sans-serif;flex-direction:column;gap:12px;color:#111827">
        <div style="color:#4f46e5;font-size:28px;font-weight:700;letter-spacing:-0.5px">⬡ VIBA</div>
        <div style="color:#5f5a50;font-size:14px">Loading…</div>
      </div>
    </div>
    <noscript>
      <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#fff7e6;display:flex;align-items:center;justify-content:center;font-family:sans-serif;flex-direction:column;gap:12px;color:#111827">
        <div style="color:#4f46e5;font-size:28px;font-weight:700">⬡ VIBA</div>
        <div style="color:#b91c1c;font-size:15px">JavaScript is required to run VIBA.</div>
        <div style="color:#5f5a50;font-size:13px">Please enable JavaScript in your browser settings.</div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
